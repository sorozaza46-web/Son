name: Build Blink Lag Exe

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Depoyu Klonla
      uses: actions/checkout@v4

    - name: MSVC Developer Command Prompt Kurulumu
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    - name: C++ Kodunu Derle (Release Mode)
      run: |
        cl.exe /EHsc /O2 main.cpp /link /OUT:BlinkLag.exe Fwpuclnt.lib User32.lib

    - name: Derlenen EXE Dosyasini Yukle
      uses: actions/upload-artifact@v4
      with:
        name: BlinkLag-Windows-Exe
        path: BlinkLag.exe
        
